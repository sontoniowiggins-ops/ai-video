name: Deploy Gallery to GitHub Pages

# Runs automatically when images or the gallery page change on master.
# Can also be triggered manually from the Actions tab.
#
# Setup: Go to repo Settings → Pages → Source → set to "GitHub Actions"
# then re-run this workflow. The gallery URL will appear in the workflow output.

on:
  push:
    branches: [master]
    paths:
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload public/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Generate Leonardo Batch 01

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Leonardo images
        env:
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
        run: node scripts/generate-leonardo-batch01.js

      - name: Upload generated images as artifact
        uses: actions/upload-artifact@v4
        with:
          name: leonardo-batch01-images
          path: |
            public/images/scene_01_ancient_kingdom_observer.png
            public/images/scene_02_covenant_people.png
            public/images/leonardo-batch01-manifest.json

      - name: Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/images/scene_01_ancient_kingdom_observer.png public/images/scene_02_covenant_people.png public/images/leonardo-batch01-manifest.json
          git commit -m "Generate Leonardo batch 01 images" || echo "No image changes to commit"
          git push
